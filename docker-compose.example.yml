# Copy to docker-compose.yml and adjust (docker-compose.yml is gitignored).
# Ruoxue VPN — server (OpenVPN + stunnel + panel) on the host network.
#
# 1) cp docker-compose.example.yml docker-compose.yml
# 2) cp .env.example .env  and set OVPN_REMOTE_HOST
# 3) docker compose pull && docker compose up -d
# 4) docker compose exec rx cat /data/panel.token
#
# Local build: comment out `image`, uncomment `build: .`

services:
  rx:
    image: ghcr.io/alex20251206-stack/rx-vpn:latest
    # build: .
    network_mode: host
    privileged: true
    environment:
      OVPN_REMOTE_HOST: ${OVPN_REMOTE_HOST:?Set in .env — public IP or hostname for clients}
      OVPN_REMOTE_PORT: ${OVPN_REMOTE_PORT:-443}
      STUNNEL_ACCEPT: ${STUNNEL_ACCEPT:-443}
      PANEL_PUBLIC_SCHEME: ${PANEL_PUBLIC_SCHEME:-http}
      PANEL_PUBLIC_PORT: ${PANEL_PUBLIC_PORT:-8139}
      LOG_DIR: /logs
    volumes:
      - ./data:/data
      - ./logs:/logs
    restart: unless-stopped
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
