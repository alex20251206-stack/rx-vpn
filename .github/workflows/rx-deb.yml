# Build client .deb (binary). Output: ovpn-panel-client_*_all.deb at repository root.
# For apt install on other machines you still need a signed APT repo (PPA, reprepro+Pages, Cloudsmith, etc.).

name: rx deb

on:
  workflow_dispatch:
  push:
    tags:
      - "rx-v*"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq dpkg-dev debhelper

      - name: Build binary package
        working-directory: client
        run: dpkg-buildpackage -us -uc -b

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: rx-deb
          path: "*.deb"
          if-no-files-found: error
