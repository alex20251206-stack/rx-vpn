# Build client packages and attach them to a GitHub Release for the pushed tag.
# Usage: git tag v0.1.4 && git push origin v0.1.4
# Assets:
#   - rx-vpn-ubuntu_0.1.4-1_all.deb
#   - rx-vpn-macos-0.1.4.tar.gz
#   - rx-vpn-macos-0.1.4.sha256
#   - rx-vpn-windows-offline-0.1.4.zip
#   - rx-vpn-windows-offline-0.1.4.sha256
#   - rx-vpn-android-0.1.4-universal.apk (debug-signed universal APK from CI; sideload / own signing)

name: Release client deb

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq dpkg-dev debhelper

      - name: Align debian/changelog with git tag
        run: bash scripts/deb-set-changelog-from-tag.sh "${{ github.ref_name }}"

      - name: Build binary package
        working-directory: client/ubuntu24
        run: dpkg-buildpackage -us -uc -b

      - name: Build macOS client tarball
        run: bash scripts/package-macos-client.sh "${{ github.ref_name }}"

      - name: Build Windows offline bundle
        run: bash scripts/package-windows-offline.sh "${{ github.ref_name }}"

      - name: Set up Java for Android build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android release APK (ui + ovpn2, universal)
        working-directory: client/android
        # No upload keystore in CI: use project property from ics-openvpn to sign release with debug key.
        run: ./gradlew :app:assembleUiOvpn2Release -PicsopenvpnDebugSign --no-daemon

      - name: Copy Android APK to release assets dir
        run: |
          VER="${GITHUB_REF_NAME#v}"
          cp client/android/app/build/outputs/apk/uiOvpn2/release/app-ui-ovpn2-universal-release.apk \
            "client/rx-vpn-android-${VER}-universal.apk"

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/rx-vpn-ubuntu_*_all.deb
            client/rx-vpn-macos-*.tar.gz
            client/rx-vpn-macos-*.sha256
            client/rx-vpn-windows-offline-*.zip
            client/rx-vpn-windows-offline-*.sha256
            client/rx-vpn-android-*-universal.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
